services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: payouts
      POSTGRES_PASSWORD: payouts
      POSTGRES_DB: payouts
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payouts"]
      interval: 5s
      timeout: 3s
      retries: 5
